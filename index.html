<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Frontend QR-CODE</title>
</head>
<body>
    <div class="qr-code">
        <div class="img">
             <img src="/imges/image-qr-code.png" alt="qr-code" id="qr-img">
             <img src="/imges/favicon-32x32.png" alt="icon" id="icon">
        </div>
       

        <div class="container">
            <h2>Improve your front-end
                skills by building projects
            </h2>

            <h3>Scan the QR code to visit Frontend Mentor and take your coding
                skills to the next level
            </h3>
        </div>

    </div>
</body>
</html>
